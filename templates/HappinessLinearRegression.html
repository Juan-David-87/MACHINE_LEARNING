<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happiness Prediction</title>
</head>
<body>
    <h1>Linear Regression: Predict Happiness Score</h1>
    <form method="post">
        <label for="gdp">GDP per Capita:</label>
        <input type="number" step="any" name="gdp" required>
        <button type="submit">Predict</button>
    </form>
    {% if result is not none %}
    <h2>Estimated Happiness Score: {{result}}</h2>
    {% endif %}
    {% if plot %}
    <h3>Regression Graph:</h3>
    <img src="data:image/png;base64,{{ plot }}" class="img-fluid"/>
    {% endif %}
</body>
</html>
<a href="/Menu" class="btn btn-secondary mt-4">Back to Menu</a>
