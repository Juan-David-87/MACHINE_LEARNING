<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ML Project{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #f1f5f9;
        }

        .card-custom {
            background: #1e293b;
            border: none;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card-custom:hover {
            transform: translateY(-5px);
        }

        img {
            border-radius: 12px;
        }

        h1, h2, h3 {
            font-weight: 600;
        }

        p {
            color: #cbd5f5;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-black shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/Menu">ML Project</a>

        <div>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/Menu">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/BasicConcepts">Concepts</a></li>
                <li class="nav-item"><a class="nav-link" href="/Application">Application</a></li>
                <li class="nav-item"><a class="nav-link" href="/FirstCase">First</a></li>
                <li class="nav-item"><a class="nav-link" href="/SecondCase">Second</a></li>
                <li class="nav-item"><a class="nav-link" href="/ThirdCase">Third</a></li>
                <li class="nav-item"><a class="nav-link" href="/FourthCase">Fourth</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
