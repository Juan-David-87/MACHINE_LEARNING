{% extends "base.html" %}

{% block content %}

<h1 class="text-center mb-5">Oil Imports Prediction, Linear Regression</h1>

<div class="row justify-content-center">

    <div class="col-md-6">
        <div class="card-custom text-center">

            <h3>Enter Year</h3>

            <form method="post">
                <div class="mb-3">
                    <input type="number" step="any" name="year" 
                           class="form-control" placeholder="e.g. 2020" required>
                </div>

                <button type="submit" class="btn btn-success">
                    Predict
                </button>
            </form>

            {% if result is not none %}
                <div class="mt-4">
                    <h4>Estimated Oil Imports:</h4>
                    <h2 class="text-success">{{ result }}</h2>
                </div>
            {% endif %}

            {% if plot %}
                <div class="mt-4">
                    <h4>Regression Graph</h4>
                    <img src="data:image/png;base64,{{ plot }}" 
                         class="img-fluid mt-3"/>
                </div>
            {% endif %}

            <a href="/Menu" class="btn btn-secondary mt-4">Back to Menu</a>

        </div>
    </div>

</div>

{% endblock %}
